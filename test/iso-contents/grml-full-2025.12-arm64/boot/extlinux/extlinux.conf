default grml
menu title Grml Live Linux
prompt 1
timeout 100

# Deliberately excluded for arm64: nofb, nokms, serial
# Under the assumption that nofb, nokms will only break video output completely,
# and serial is default-enabled.

label grml
menu label grml-full-arm64 Standard (2025.12, arm64)
linux /boot/grmlfullarm64/vmlinuz
initrd /boot/grmlfullarm64/initrd.img
fdtdir /boot/grmlfullarm64/dtbs/
append boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 \${bootargs} nomce

label ssh
menu label Enable SSH (with random password)
linux /boot/grmlfullarm64/vmlinuz
initrd /boot/grmlfullarm64/initrd.img
fdtdir /boot/grmlfullarm64/dtbs/
append boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 \${bootargs} nomce ssh

label grml2ram
menu label Load Grml to RAM
linux /boot/grmlfullarm64/vmlinuz
initrd /boot/grmlfullarm64/initrd.img
fdtdir /boot/grmlfullarm64/dtbs/
append boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 \${bootargs} nomce toram=grml-full-arm64.squashfs

label grmlmedium2ram
menu label Load whole medium to RAM
linux /boot/grmlfullarm64/vmlinuz
initrd /boot/grmlfullarm64/initrd.img
fdtdir /boot/grmlfullarm64/dtbs/
append boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 \${bootargs} nomce toram

label forensic
menu label Forensic Mode
linux /boot/grmlfullarm64/vmlinuz
initrd /boot/grmlfullarm64/initrd.img
fdtdir /boot/grmlfullarm64/dtbs/
append boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 \${bootargs} nomce read-only nofstab noraid nolvm noautoconfig noswap raid=noautodetect

label persistence
menu label Forensic Mode
linux /boot/grmlfullarm64/vmlinuz
initrd /boot/grmlfullarm64/initrd.img
fdtdir /boot/grmlfullarm64/dtbs/
append boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 \${bootargs} nomce persistence

label lang-de
menu label Load German Keyboard Layout
linux /boot/grmlfullarm64/vmlinuz
initrd /boot/grmlfullarm64/initrd.img
fdtdir /boot/grmlfullarm64/dtbs/
append boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 \${bootargs} nomce lang=de

label grml-full-arm64x
menu label Graphical Mode
linux /boot/grmlfullarm64/vmlinuz
initrd /boot/grmlfullarm64/initrd.img
fdtdir /boot/grmlfullarm64/dtbs/
append boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 \${bootargs} nomce lang=de

label debug
menu label Debug Mode
linux /boot/grmlfullarm64/vmlinuz
initrd /boot/grmlfullarm64/initrd.img
fdtdir /boot/grmlfullarm64/dtbs/
append boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 \${bootargs} nomce initcall verbose debug=vc systemd.log_level=debug systemd.log_target=kmsg log_buf_len=1M
