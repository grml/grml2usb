submenu "  ⇢ Options" --class=submenu {
menuentry "Enable SSH (with random password)" {
    set gfxpayload=keep
    echo 'Loading kernel...'
    linux  /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} ssh 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}

menuentry "Load Grml to RAM" {
    set gfxpayload=keep
    echo 'Loading kernel...'
    linux  /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} toram=grml-full-arm64.squashfs 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}

menuentry "Load whole medium to RAM" {
    set gfxpayload=keep
    echo 'Loading kernel...'
    linux  /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} toram 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}

menuentry "Forensic Mode" {
    set gfxpayload=keep
    echo 'Loading kernel...'
    linux /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} read-only nofstab noraid nolvm noautoconfig noswap raid=noautodetect 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}

menuentry "Persistency Mode" {
    set gfxpayload=keep
    echo 'Loading kernel...'
    linux  /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} persistence 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}

menuentry "Load German Keyboard Layout" {
    set gfxpayload=keep
    echo 'Loading kernel...'
    linux  /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} lang=de 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}

menuentry "Graphical Mode" {
    set gfxpayload=keep
    echo 'Loading kernel...'
    linux  /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} startx 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}

menuentry "Disable Framebuffer" {
    set gfxpayload=text
    echo 'Loading kernel...'
    linux  /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} radeon.modeset=0 i915.modeset=0 nouveau.modeset=0 cirrus.modeset=0 mgag200.modeset=0 nomodeset 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}

menuentry "Disable Video Kernel Mode Setting" {
    set gfxpayload=keep
    echo 'Loading kernel...'
    linux  /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} radeon.modeset=0 i915.modeset=0 nouveau.modeset=0 cirrus.modeset=0 mgag200.modeset=0 nomodeset 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}

menuentry "Debug Mode" {
    set gfxpayload=keep
    echo 'Loading kernel...'
    linux /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} initcall verbose debug=vc systemd.log_level=debug systemd.log_target=kmsg log_buf_len=1M 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}

menuentry "Serial Console" {
    set gfxpayload=text
    echo 'Loading kernel...'
    linux /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 nomce "${loopback}" ${kernelopts} video=vesafb:off console=tty1 console=ttyS0,115200n8 
    echo 'Loading initrd...'
    initrd /boot/grmlfullarm64/initrd.img
}
}
