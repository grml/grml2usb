menuentry "grml-full-arm64 2025.12" {
    set gfxpayload=keep
    echo 'Loading kernel...'
    linux   /boot/grmlfullarm64/vmlinuz apm=power-off boot=live live-media-path=/live/grml-full-arm64/ bootid=grmlfullarm64202512 "${loopback}" ${kernelopts} nomce 
    echo 'Loading initrd...'
    initrd  /boot/grmlfullarm64/initrd.img
}
