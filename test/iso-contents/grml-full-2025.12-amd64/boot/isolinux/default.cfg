default grml
label grml
  menu DEFAULT
  menu label grml-full-amd64 ^Standard (2025.12, amd64)
  kernel /boot/grmlfullamd64/vmlinuz
  append initrd=/boot/grmlfullamd64/initrd.img boot=live live-media-path=/live/grml-full-amd64/ bootid=grmlfullamd64202512 apm=power-off vga=791 nomce 

  text help
                                        Grml is a Debian based Linux live
                                        system for system administrators
                                        and users of text tools.

                                                         http://grml.org/
  endtext

