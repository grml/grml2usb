default grml
label grml
  menu DEFAULT
  menu label grml-full-amd64 ^Standard (2025.12, amd64)
  kernel vmlinuz
  append initrd=initrd.img root=/dev/nfs rw nfsroot=192.168.0.1:/live/image boot=live live-media-path=/live/grml-full-amd64/ bootid=grmlfullamd64202512 apm=power-off nomce noprompt noeject vga=791 

  text help
                                        Grml is a Debian based Linux live
                                        system for system administrators
                                        and users of text tools.

                                                         http://grml.org/
  endtext

